name: voteready
description: VoteReady – Your step-by-step Indian election companion app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1

  # Navigation
  go_router: ^17.2.2

  # HTTP
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.2

  # URL launcher
  url_launcher: ^6.3.0

  # Fonts
  google_fonts: ^8.0.2

  # Utilities
  intl: ^0.20.2
  crypto: ^3.0.3
  uuid: ^4.4.0

  # Testing
  mockito: ^5.4.4
  build_test: ^3.5.12

  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.2.0
  firebase_auth: ^6.4.0
  permission_handler: ^12.0.1

  # Performance
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700

    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500